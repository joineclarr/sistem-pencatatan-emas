<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gold Portfolio Pro</title>
    <meta name="description" content="Login ke Gold Portfolio Pro — Manajemen Aset Emas Premium">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --bg: #0f1219;
            --card: #1a1f2c;
            --border: rgba(212,175,55,0.18);
            --red: #e74c3c;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .bg-glow-1 { width:500px;height:500px;background:rgba(212,175,55,0.08);top:-150px;right:-150px; }
        .bg-glow-2 { width:400px;height:400px;background:rgba(212,175,55,0.05);bottom:-100px;left:-100px; }

        .login-card {
            position: relative;
            z-index: 10;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 80px rgba(212,175,55,0.06);
            animation: appear .5s ease;
        }
        @keyframes appear {
            from { opacity:0; transform:translateY(24px) scale(.97); }
            to   { opacity:1; transform:translateY(0)    scale(1); }
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #f1c40f, #d4af37);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 28px rgba(212,175,55,0.28);
        }
        .logo h1 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { color:#6b7490; font-size:13px; margin-top:4px; }

        .field { margin-bottom:16px; }
        .field label { display:block; font-size:12px; color:#6b7490; font-weight:600; margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#4a5568; font-size:14px; }
        .input-wrap input {
            width:100%; padding:14px 16px 14px 44px;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 13px;
            color: #f0f0f0;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-wrap input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
        }

        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #f1c40f, #d4af37);
            border: none; border-radius: 13px;
            color: #111; font-weight: 700; font-size: 16px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer; margin-top: 8px;
            box-shadow: 0 6px 24px rgba(212,175,55,0.3);
            transition: transform .2s, box-shadow .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 28px rgba(212,175,55,0.4); }
        .btn-login:disabled { opacity:.7; cursor:not-allowed; }

        .error-box {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 10px;
            color: var(--red);
            font-size: 13px;
            text-align: center;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: #3d4359;
        }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">💰</div>
            <h1>Gold Portfolio Pro</h1>
            <p>Platform Manajemen Aset Emas Premium</p>
        </div>

        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input id="username" type="text" placeholder="Masukkan username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input id="password" type="password" placeholder="Masukkan password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <button id="btnLogin" class="btn-login" onclick="doLogin()">
            <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
        </button>

        <div id="errorBox" class="error-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMsg">Username atau password salah.</span>
        </div>

        <p class="footer-note">© 2026 Gold Portfolio Pro · Secured via Google Apps Script</p>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxihPFjbis6In7zSM8Q5nsKOsq8fFYpySt7Idxg7ngLulvNOSCE-r3To0EeaAPFk7TbJA/exec';

        // Redirect jika sudah login
        if (localStorage.getItem('gold_login') === '1') {
            window.location.href = 'dashboard.html';
        }

        async function doLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const errBox = document.getElementById('errorBox');
            const errMsg = document.getElementById('errorMsg');

            errBox.style.display = 'none';

            if (!u || !p) {
                errMsg.textContent = 'Username dan password tidak boleh kosong.';
                errBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...';

            try {
                const url = APPS_SCRIPT_URL + '?action=login&user=' + encodeURIComponent(u) + '&pass=' + encodeURIComponent(p);
                const res = await fetch(url);
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('gold_login', '1');
                    localStorage.setItem('gold_user', u);
                    window.location.href = 'dashboard.html';
                } else {
                    errMsg.textContent = data.message || 'Username atau password salah.';
                    errBox.style.display = 'block';
                }
            } catch (e) {
                errMsg.textContent = 'Gagal terhubung ke server. Periksa koneksi internet Anda.';
                errBox.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
        }
    </script>
</body>
</html>
