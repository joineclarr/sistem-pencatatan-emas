<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harga Emas Lengkap — Catatan emas K&D</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --gold-primary: #f1c40f;
            --gold-dark: #d4af37;
            --gold-light: #f3e5ab;
            --bg-dark: #0f1219;
            --card-dark: #1a1f2c;
            --text-light: #f5f6fa;
            --text-muted: #8b9bb4;
            --green: #2ecc71;
            --red: #e74c3c;
            --border-color: rgba(212, 175, 55, 0.15);
        }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Outfit',sans-serif; }
        body { background:var(--bg-dark); color:var(--text-light); min-height:100vh; }

        .header { background:linear-gradient(180deg,#161b26 0%,#0f1219 100%); border-bottom:1px solid var(--border-color); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
        .header h2 { font-size:20px; background:linear-gradient(135deg,var(--gold-light),var(--gold-dark)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:700; }
        .btn-back { background:rgba(212,175,55,0.1); border:1px solid var(--border-color); color:var(--gold-light); padding:8px 16px; border-radius:10px; font-weight:600; cursor:pointer; font-size:13px; text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; }
        .btn-back:hover { background:rgba(212,175,55,0.2); }

        .container { max-width:1200px; margin:auto; padding:28px 20px; }

        .info-banner { background:rgba(46,204,113,0.08); border:1px solid rgba(46,204,113,0.2); border-radius:10px; padding:12px 16px; margin-bottom:24px; font-size:13px; color:var(--green); display:flex; align-items:center; gap:10px; }
        .info-banner.loading { color:var(--gold-light); background:rgba(241,196,15,0.08); border-color:rgba(241,196,15,0.2); }

        .source-tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
        .source-tab { padding:9px 16px; border:1px solid var(--border-color); background:transparent; color:var(--text-muted); border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.2s; }
        .source-tab.active { background:rgba(212,175,55,0.15); color:var(--gold-light); border-color:var(--gold-dark); }
        .source-tab:hover { background:rgba(212,175,55,0.1); color:var(--gold-light); }

        .source-section { background:var(--card-dark); border-radius:14px; border:1px solid var(--border-color); overflow:hidden; margin-bottom:20px; box-shadow:0 8px 20px rgba(0,0,0,.2); }
        .source-header { padding:18px 22px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; }
        .source-title { font-size:16px; font-weight:700; color:var(--gold-light); display:flex; align-items:center; gap:10px; }
        .source-badge { font-size:11px; background:rgba(46,204,113,0.12); color:var(--green); padding:4px 10px; border-radius:6px; font-weight:600; }

        .table-responsive { width:100%; overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { background:rgba(255,255,255,.03); color:var(--text-muted); font-weight:600; padding:12px 16px; text-align:left; border-bottom:1px solid rgba(255,255,255,.06); white-space:nowrap; text-transform:uppercase; font-size:11px; letter-spacing:.5px; }
        td { padding:13px 16px; color:var(--text-light); border-bottom:1px solid rgba(255,255,255,.03); }
        tr:hover td { background:rgba(255,255,255,.02); }
        .price-sell { color:#4ade80; font-weight:600; }
        .price-buyback { color:#f87171; font-weight:600; }
        .price-pergram { color:var(--text-muted); font-size:12px; }
        .weight-col { font-weight:700; }
        .brand-col { font-weight:600; color:var(--gold-light); }

        .empty-state { text-align:center; padding:40px; color:var(--text-muted); }

        .toast { position:fixed; bottom:20px; right:20px; background:var(--card-dark); border-left:4px solid var(--gold-primary); padding:14px 22px; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,.3); z-index:2000; display:flex; align-items:center; gap:10px; transform:translateY(150%); opacity:0; transition:all .3s ease; font-size:14px; }
        .toast.show { transform:translateY(0); opacity:1; }

        @media (max-width:600px) {
            .header { padding:14px 16px; }
            .container { padding:16px 12px; }
            .source-tabs { gap:6px; }
            .source-tab { padding:7px 12px; font-size:12px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h2>📋 Harga Emas Lengkap</h2>
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="container">
        <!-- Info Banner -->
        <div class="info-banner loading" id="infoBanner">
            <i class="fa-solid fa-spinner fa-spin"></i> Memuat data harga dari semua sumber...
        </div>

        <!-- Source Tabs -->
        <div class="source-tabs" id="sourceTabs">
            <button class="source-tab active" data-source="all" onclick="filterSource('all')">Semua</button>
            <button class="source-tab" data-source="antam" onclick="filterSource('antam')">🏆 Antam</button>
            <button class="source-tab" data-source="galeri24" onclick="filterSource('galeri24')">💎 Galeri 24</button>
            <button class="source-tab" data-source="pegadaian" onclick="filterSource('pegadaian')">🏛️ Pegadaian</button>
            <button class="source-tab" data-source="hartadinata" onclick="filterSource('hartadinata')">✨ Hartadinata</button>
            <button class="source-tab" data-source="kinghalim" onclick="filterSource('kinghalim')">🪙 King Halim</button>
            <button class="source-tab" data-source="lotusarchi" onclick="filterSource('lotusarchi')">🌸 Lotus Archi</button>
        </div>

        <!-- Data Container -->
        <div id="dataContainer">
            <div class="empty-state"><i class="fa-solid fa-spinner fa-spin" style="font-size:24px;color:var(--gold-primary);"></i><p style="margin-top:12px;">Memuat data...</p></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check" style="color:var(--gold-primary);"></i>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ─── CONFIG ───────────────────────────────────────────
        const EMAS_API_BASE = 'https://emas.maulanar.my.id';
        const EMAS_API_KEY = localStorage.getItem('emas_api_key') || '0e527e82-a8cc-40bb-bdd0-1868a488d391';
        const SHEETS_URL = localStorage.getItem('gold_sheets_url') || 'https://script.google.com/macros/s/AKfycbx8YTHcSOrGWHq3AZ4Vfj8v3euV-AylKssaofMD_tLW3510NXPB89hJFKbFiu1tit5qkA/exec';

        let allSourceData = {};
        let currentFilter = 'all';

        // ─── AUTH GUARD ───────────────────────────────────────
        if (localStorage.getItem('gold_login') !== '1') {
            window.location.href = 'index.html';
        }

        // ─── API FETCH ────────────────────────────────────────
        // Cek metode tercepat yang tersimpan (hindari direct fetch yang gagal di file://)
        function getFetchMode() { return localStorage.getItem('emas_fetch_mode') || 'auto'; }
        function setFetchMode(m) { localStorage.setItem('emas_fetch_mode', m); }

        async function emasApiFetch(endpoint) {
            const mode = getFetchMode();

            // Coba langsung hanya jika belum diketahui gagal
            if (mode !== 'proxy') {
                try {
                    const headers = { 'X-API-Key': EMAS_API_KEY };
                    const res = await fetch(EMAS_API_BASE + endpoint, { headers });
                    const json = await res.json();
                    if (json.status === 'success') { setFetchMode('direct'); return json; }
                    if (json.status === 'error') throw new Error(json.data || json.message);
                } catch (directErr) {
                    if (directErr.message && !directErr.message.includes('Failed to fetch') && !directErr.message.includes('NetworkError')) {
                        throw directErr;
                    }
                    setFetchMode('proxy'); // ingat: pakai proxy saja ke depannya
                }
            }

            // Proxy Apps Script
            const proxyUrl = SHEETS_URL + '?action=emas_proxy&endpoint=' + encodeURIComponent(endpoint) + '&api_key=' + encodeURIComponent(EMAS_API_KEY);
            const res = await fetch(proxyUrl);
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch { throw new Error('Invalid JSON dari proxy'); }
            if (json.status === 'error') {
                throw new Error(json.data || json.message || 'API Error via proxy');
            }
            return json;
        }

        // Batch fetch: ambil banyak endpoint dalam 1 round trip (paralel di server)
        async function emasApiBatch(endpoints) {
            const mode = getFetchMode();

            // Jika direct works, fetch paralel langsung
            if (mode === 'direct') {
                const results = {};
                await Promise.all(endpoints.map(async (ep) => {
                    try {
                        const res = await fetch(EMAS_API_BASE + ep, { headers: { 'X-API-Key': EMAS_API_KEY } });
                        results[ep] = await res.json();
                    } catch (e) { results[ep] = { status: 'error' }; }
                }));
                return results;
            }

            // Pakai batch proxy (1 request untuk semua)
            const proxyUrl = SHEETS_URL + '?action=emas_batch&endpoints=' + encodeURIComponent(endpoints.join('|')) + '&api_key=' + encodeURIComponent(EMAS_API_KEY);
            const res = await fetch(proxyUrl);
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch { throw new Error('Invalid JSON dari batch proxy'); }
            if (json.status === 'error') throw new Error(json.message || 'Batch error');
            return json.batch || {};
        }

        // ─── CACHE ────────────────────────────────────────────
        const CACHE_KEY = 'emas_harga_cache';
        const CACHE_TTL = 15 * 60 * 1000; // 15 menit

        function readCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (Date.now() - obj.ts > CACHE_TTL) return { data: obj.data, stale: true };
                return { data: obj.data, stale: false };
            } catch { return null; }
        }
        function writeCache(data) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
        }

        // ─── LOAD ALL ─────────────────────────────────────────
        const SOURCES = ['antam', 'galeri24', 'pegadaian', 'hartadinata', 'kinghalim', 'lotusarchi'];

        function dedupeLatest(items) {
            const latest = {};
            items.forEach(item => {
                const key = `${item.brand}_${item.weight}`;
                if (!latest[key]) latest[key] = item;
            });
            return Object.values(latest);
        }

        async function loadAllPrices() {
            // 1. Tampilkan cache dulu (instan, < 50ms) jika ada
            const cached = readCache();
            if (cached && cached.data) {
                allSourceData = cached.data;
                const totalCached = Object.values(allSourceData).reduce((s, a) => s + a.length, 0);
                const banner = document.getElementById('infoBanner');
                banner.className = 'info-banner';
                banner.innerHTML = `<i class="fa-solid fa-bolt" style="color:var(--gold-primary)"></i> <strong>${totalCached}</strong> data (cache) — memperbarui...`;
                renderSources();
                if (!cached.stale) {
                    // cache masih segar, refresh diam-diam di background tanpa blokir
                    refreshInBackground();
                    return;
                }
            }

            // 2. Fetch fresh via batch (1 round trip)
            await fetchFresh();
        }

        async function fetchFresh() {
            const banner = document.getElementById('infoBanner');
            try {
                const endpoints = SOURCES.map(src => `/api/prices/resource/${src}?limit=50&sort_by=updated_at&order=desc`);
                const batch = await emasApiBatch(endpoints);

                const newData = {};
                SOURCES.forEach((src, i) => {
                    const res = batch[endpoints[i]];
                    if (res && res.status === 'success' && res.data) {
                        const items = Array.isArray(res.data) ? res.data : [res.data];
                        newData[src] = dedupeLatest(items);
                    }
                });

                if (Object.keys(newData).length > 0) {
                    allSourceData = newData;
                    writeCache(newData);
                }

                const totalItems = Object.values(allSourceData).reduce((sum, arr) => sum + arr.length, 0);
                if (totalItems > 0) {
                    banner.className = 'info-banner';
                    banner.innerHTML = `<i class="fa-solid fa-circle-check"></i> <strong>${totalItems}</strong> data harga dari <strong>${Object.keys(allSourceData).length}</strong> sumber — emas.maulanar.my.id`;
                    showToast(`✅ ${totalItems} data harga diperbarui`);
                } else {
                    banner.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat data. Periksa koneksi atau API key.`;
                    banner.style.borderColor = 'rgba(231,76,60,0.3)';
                    banner.style.color = 'var(--red)';
                }
                renderSources();
            } catch (e) {
                console.error(e);
                if (Object.keys(allSourceData).length === 0) {
                    banner.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat data: ${e.message}`;
                    banner.style.borderColor = 'rgba(231,76,60,0.3)';
                    banner.style.color = 'var(--red)';
                }
            }
        }

        function refreshInBackground() {
            fetchFresh();
        }

        // ─── FILTER ───────────────────────────────────────────
        function filterSource(source) {
            currentFilter = source;
            document.querySelectorAll('.source-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.source === source);
            });
            renderSources();
        }

        // ─── RENDER ───────────────────────────────────────────
        const sourceNames = {
            'antam': { icon: '🏆', name: 'Logam Mulia (Antam)', desc: 'logammulia.com' },
            'galeri24': { icon: '💎', name: 'Galeri 24', desc: 'galeri24.co.id' },
            'pegadaian': { icon: '🏛️', name: 'Pegadaian', desc: 'pegadaian.co.id' },
            'hartadinata': { icon: '✨', name: 'Hartadinata (Emasku)', desc: 'hartadinataabadi.co.id' },
            'kinghalim': { icon: '🪙', name: 'King Halim', desc: 'kinghalim.com' },
            'lotusarchi': { icon: '🌸', name: 'Lotus Archi', desc: 'lotusarchi.com' }
        };

        function renderSources() {
            const container = document.getElementById('dataContainer');
            const sources = currentFilter === 'all' ? Object.keys(allSourceData) : [currentFilter];
            
            if (sources.length === 0 || !sources.some(s => allSourceData[s]?.length > 0)) {
                container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open" style="font-size:32px;color:var(--text-muted);"></i><p style="margin-top:12px;">Tidak ada data untuk sumber ini.</p></div>';
                return;
            }

            let html = '';
            sources.forEach(src => {
                const items = allSourceData[src];
                if (!items || items.length === 0) return;

                const info = sourceNames[src] || { icon: '📦', name: src, desc: '' };
                const sorted = [...items].sort((a, b) => (a.weight || 0) - (b.weight || 0));

                html += `<div class="source-section">
                    <div class="source-header">
                        <div class="source-title">${info.icon} ${info.name}</div>
                        <span class="source-badge">${info.desc} • ${sorted.length} item</span>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Brand</th>
                                    <th>Berat</th>
                                    <th>Harga Jual</th>
                                    <th>Buyback</th>
                                    <th>Per Gram</th>
                                </tr>
                            </thead>
                            <tbody>`;

                sorted.forEach(item => {
                    const weight = item.weight || item.gramasi || 0;
                    const ppg = weight > 0 ? Math.round(item.sell_price / weight) : 0;
                    html += `<tr>
                        <td class="brand-col">${item.brand || '-'}</td>
                        <td class="weight-col">${weight} gr</td>
                        <td class="price-sell">Rp ${item.sell_price ? item.sell_price.toLocaleString('id-ID') : '-'}</td>
                        <td class="price-buyback">${item.buyback_price > 0 ? 'Rp ' + item.buyback_price.toLocaleString('id-ID') : '<span style="color:var(--text-muted)">-</span>'}</td>
                        <td class="price-pergram">${ppg > 0 ? 'Rp ' + ppg.toLocaleString('id-ID') + '/gr' : '-'}</td>
                    </tr>`;
                });

                html += `</tbody></table></div></div>`;
            });

            container.innerHTML = html;
        }

        // ─── HELPERS ──────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ─── INIT ─────────────────────────────────────────────
        loadAllPrices();
    </script>
</body>
</html>
